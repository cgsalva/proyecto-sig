<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/startbootstrap-sb-admin/5.1.1/css/sb-admin.min.css"
        rel="stylesheet" />
</head>

<body class="bg-dark d-flex flex-column h-100">
    <main role="main" class="flex-shrink-0 pt-5">
        <div class="container">
            <div class="card card-login mx-auto mt-5">
                <div class="card-header text-center py-3">
                    <h4 class="my-0">Iniciar sesión</h4>
                </div>
                <div class="card-body my-2">
                    <form id="form_login" name="form_login" method="POST" autocomplete="off">
                        {% csrf_token %}
                        <div class="form-group">
                            <div class="input-group mb-2">
                                <input type="text" id="username" name="username" class="form-control"
                                    placeholder="Usuario" required="required" autofocus="autofocus">
                                <div class="input-group-prepend">
                                    <div class="input-group-text"><span class="fas fa-fw fa-user"></span></div>
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="input-group mb-2">
                                <input type="password" id="password" name="password" class="form-control"
                                    placeholder="Contraseña" required="required">
                                <div class="input-group-prepend">
                                    <div class="input-group-text"><span class="fas fa-fw fa-key"></span></div>
                                </div>
                            </div>
                        </div>
                        {% if error %}
                        <p class="text-danger text-center">{{ error }}</p>
                        {% endif %}

                        <button type="submit" class="btn btn-info btn-block">Entrar</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/boosted/4.3.1/js/boosted.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-easing/1.4.1/jquery.easing.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/startbootstrap-sb-admin/5.1.1/js/sb-admin.min.js"></script>
</body>

</html>
