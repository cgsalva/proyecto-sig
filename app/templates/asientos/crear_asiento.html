{% extends "base.html" %}

{% block content %}
<h4>Crear Asiento Contable</h4>
    <form method="POST">
        {% csrf_token %}
        <!-- DATOS DEL ASIENTO -->
        <div class="row mb-4">

            <div class="col-md-4">
                <label class="form-label">
                    Fecha
                </label>

                <input type="date" name="fecha" class="form-control" required>
            </div>

            <div class="col-md-8">
                <label class="form-label">
                    Descripción
                </label>

                <input type="text" name="descripcion" class="form-control" placeholder="Descripción del asiento"
                    required>
            </div>

        </div>

        <!-- TABLA DE MOVIMIENTOS -->
        <div class="table-responsive">
            <table class="table table-bordered align-middle">
                <thead class="table-light">
                    <tr>
                        <th width="30%">Cuenta</th>
                        <th width="30%">Debe</th>
                        <th width="30%">Haber</th>
                        <th width="10%">Acción</th>
                    </tr>

                </thead>
                <tbody id="tabla-movimientos">
                    <tr>
                        <td>
                            <select name="cuenta[]" class="form-control form-control-sm" required>
                                <option value="">
                                    Seleccionar cuenta
                                </option>
                                {% for cuenta in cuentas %}
                                <option value="{{ cuenta.codigo }}">
                                    {{ cuenta.codigo }} - {{ cuenta.nombre }}
                                </option>
                                {% endfor %}
                            </select>
                        </td>

                        <td>

                            <input type="number" step="0.01" min="0" name="debe[]" class="form-control form-control-sm debe" value="0"
                                required>

                        </td>

                        <td>

                            <input type="number" step="0.01" min="0" name="haber[]" class="form-control form-control-sm haber" value="0"
                                required>

                        </td>

                        <td class="text-center">

                            <button type="button" class="btn btn-danger btn-sm eliminar-fila">
                                X
                            </button>

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

        <!-- BOTONES -->

        <div class="d-flex justify-content-between mt-3">

            <button type="button" class="btn btn-secondary" id="agregar-fila">
                Agregar Movimiento
            </button>

            <div>

                <button type="reset" class="btn btn-outline-danger">
                    Cancelar
                </button>

                <button type="submit" class="btn btn-primary">
                    Guardar Asiento
                </button>

            </div>

        </div>

        <!-- TOTALES -->

        <div class="row mt-4">

            <div class="col-md-6">

                <div class="alert alert-info">

                    <strong>Total Debe:</strong>
                    $<span id="total-debe">0.00</span>

                </div>

            </div>

            <div class="col-md-6">

                <div class="alert alert-success">

                    <strong>Total Haber:</strong>
                    $<span id="total-haber">0.00</span>

                </div>

            </div>

        </div>

        <!-- ESTADO -->

        <div class="alert alert-warning text-center" id="estado-balance">
            El asiento no está balanceado
        </div>

    </form>


<script>

    const tablaMovimientos = document.getElementById('tabla-movimientos')
    const btnAgregarFila = document.getElementById('agregar-fila')

    function calcularTotales() {

        let totalDebe = 0
        let totalHaber = 0

        document.querySelectorAll('.debe').forEach(input => {
            totalDebe += parseFloat(input.value || 0)
        })

        document.querySelectorAll('.haber').forEach(input => {
            totalHaber += parseFloat(input.value || 0)
        })

        document.getElementById('total-debe').textContent =
            totalDebe.toFixed(2)

        document.getElementById('total-haber').textContent =
            totalHaber.toFixed(2)

        const estado = document.getElementById('estado-balance')

        if (totalDebe === totalHaber && totalDebe > 0) {

            estado.classList.remove('alert-warning')
            estado.classList.add('alert-success')

            estado.textContent = 'El asiento está balanceado'

        } else {

            estado.classList.remove('alert-success')
            estado.classList.add('alert-warning')

            estado.textContent =
                'El asiento no está balanceado'
        }
    }

    btnAgregarFila.addEventListener('click', () => {

        const fila = `
        <tr>

            <td>

                <select
                    name="cuenta[]"
                    class="form-control form-control-sm"
                    required
                >

                    <option value="">
                        Seleccionar cuenta
                    </option>

                    {% for cuenta in cuentas %}

                        <option value="{{ cuenta.codigo }}">
                            {{ cuenta.codigo }} - {{ cuenta.nombre }}
                        </option>

                    {% endfor %}

                </select>

            </td>

            <td>

                <input
                    type="number"
                    step="0.01"
                    min="0"
                    name="debe[]"
                    class="form-control form-control-sm debe"
                    value="0"
                    required
                >

            </td>

            <td>

                <input
                    type="number"
                    step="0.01"
                    min="0"
                    name="haber[]"
                    class="form-control form-control-sm haber"
                    value="0"
                    required
                >

            </td>

            <td class="text-center">

                <button
                    type="button"
                    class="btn btn-danger btn-sm eliminar-fila"
                >
                    X
                </button>

            </td>

        </tr>
    `

        tablaMovimientos.insertAdjacentHTML(
            'beforeend',
            fila
        )

    })

    document.addEventListener('input', calcularTotales)

    document.addEventListener('click', function (event) {

        if (event.target.classList.contains('eliminar-fila')) {

            event.target.closest('tr').remove()

            calcularTotales()
        }

    })

    calcularTotales()

</script>

{% endblock %}
