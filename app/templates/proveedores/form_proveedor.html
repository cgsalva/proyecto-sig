{% extends "base.html" %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<h4 class="mb-4">{{ titulo }}</h4>
<form method="post">
    {% csrf_token %}
    <div class="row">
        <div class="col-12 mb-3">
            <label>
                <span class="text-danger">*</span>Nombre
            </label>
            {{ form.nombre }}
        </div>
    </div>
    <div class="row">
        <div class="col-12 mb-3">
            <label>Direccion</label>
            {{ form.direccion }}
        </div>
    </div>
    <div class="row">
        <div class="col-12 mb-3">
            <label>Sitio Web</label>
            {{ form.website }}
        </div>
    </div>
    <div class="row">
        <div class="col-12 col-md-6 mb-3">
            <label>Telefono</label>
            {{ form.telefono }}
        </div>
        <div class="col-12 col-md-6 mb-3">
            <label>Correo electrónico</label>
            {{ form.email }}
        </div>
    </div>

    <p class="text-danger">( * ) Campo obligatorio</p>

    <a href="{% url 'listar_proveedores' %}" class="btn btn-info">
        Volver
    </a>
    <button type="submit" class="btn btn-success">
        Guardar
    </button>
</form>

{% endblock %}
