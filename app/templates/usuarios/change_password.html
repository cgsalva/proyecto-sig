{% extends "base.html" %}

{% block title %}Cuentas{% endblock %}

{% block content %}
<h4>Modificar contraseña</h4>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    <a href="{% url 'user_profile' %}" class="btn btn-info">Volver</a>
    <button type="submit" class="btn btn-success">Cambiar contraseña</button>
</form>
{% endblock %}
