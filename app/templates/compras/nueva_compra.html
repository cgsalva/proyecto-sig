{% extends "base.html" %}

{% block title %}Productos{% endblock %}

{% block content %}
<h4>Nueva compra</h4>

<form id="form_compra" name="form_compra" class="form-horizontal" method="post" autocomplete="off">

    <div class="row">
        <div class="col-12 col-sm-4">
            <label>Código del producto:</label>
            <div class="input-group input-group-sm mb-3">
                <div class="input-group-prepend">
                    <span class="input-group-text"><i class="fa-solid fa-barcode"></i></span>
                </div>
                <input type="text" class="form-control" placeholder="Escribe el código y presiona enter">
                <div class="input-group-append">
                    <button class="btn btn-light" type="button"><i class="fa-solid fa-magnifying-glass"></i></button>
                    <button class="btn btn-light" type="button"><i class="fa-solid fa-circle-plus"></i></button>
                </div>
            </div>
        </div>
        <div class="col-12 col-sm-4 mb-3">
            <label>Nombre del producto:</label>
            <input class="form-control form-control-sm" id="nombre" name="nombre" type="text">
        </div>
    </div>

    <div class="row">
        <div class="col-12 col-sm-4 mb-3">
            <label>Cantidad Comprada:</label>
            <input class="form-control form-control-sm" id="cantidad" type="number" min="0">
        </div>
        <div class="col-12 col-sm-4 mb-3">
            <label>Unidad de Medida (Compra):</label>
            <select id="inputState" class="form-control form-control-sm">
                <option value="caja">Caja</option>
                <option value="paquete">Paquete</option>
                <option value="unidad">Unidad</option>
                <option value="kilogramo">Kilogramo</option>
            </select>
        </div>
        <div class="col-12 col-sm-4 mb-3">
            <label>Precio de compra:</label>
            <div class="input-group">
                <div class="input-group-prepend">
                    <span class="input-group-text"><i class="fa-solid fa-dollar-sign"></i></span>
                </div>
                <input class="form-control form-control-sm" type="number" value="0.00" step="0.01" />
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-12 mb-3">
            <button id="agregar_producto" type="button" class="btn btn-primary">Agregar Producto</button>
        </div>
    </div>

    <table id="tablaProductosVenta" class="table table-hover table-striped table-sm">
        <thead class="thead-dark">
            <tr>
                <th>#</th>
                <th>Código</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Cantidad</th>
                <th>Total</th>
                <th width='1%'></th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

    <div class="row">
        <div class="col-12 col-sm-6 offset-md-6">
            <label style='font-weight:bold; font-size:30px; text-align:center;'> Total $</label><input type="text"
                name="total" id="total" size="7" readonly="true" value="0.00"
                style='font-weight:bold; font-size:30px; text-align:center; border:#E2EBED; background:#ffffff' />
            <button id="completa_compra" type="button" class="btn btn-success">Completar compra</button>
        </div>
    </div>
</form>

{% endblock %}
